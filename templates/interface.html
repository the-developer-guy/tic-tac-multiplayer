<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function sendRequest() {
            const xhttp = new XMLHttpRequest;
            xhttp.onload = function() {
              const data = JSON.parse(this.responseText)
              console.log(data["1"]);
              console.log(data);
              fillElements(data);
             }
             xhttp.open("GET", "/fetchdata/", true) 
             xhttp.send();
        }
        function fillElements(data) {
            const placeholder = document.getElementById("data-placeholder");
            const template = document.getElementById("player-template");
            placeholder.innerHTML = ""; // Clear previous content

            Object.values(data).forEach(player => {
                const clone = template.content.cloneNode(true);

                clone.querySelector(".player-name").textContent = `Name: ${player.name}`;
                clone.querySelector(".player-token").textContent = `Token: ${player.token}`;
                clone.querySelector(".player-register").textContent = `Date of Register: ${player.dateOfRegister}`;
                clone.querySelector(".player-banned").textContent = `Banned: ${player.isBanned}`;
                clone.querySelector("#tokenplaceholder").value = player.token;

                const banBtn = clone.querySelector("#ban-btn");
                banBtn.textContent = player.isBanned ? "Enable" : "Ban";
                banBtn.addEventListener("click", function() {
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', '/handleplayeraccess/', true);
                    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                    xhr.send(`token=${player.token}`);
                    location.reload() 
                });

                const regenBtn = clone.querySelector(".regen-btn");
                regenBtn.addEventListener("click", function() {
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', '/regeneratetoken/', true);
                    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                    xhr.send(`token=${player.token}`);
                    location.reload() 
                });

                const removeBtn = clone.querySelector(".remove-btn:not(#ban-btn)");
                removeBtn.addEventListener("click", function() {
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', '/removeplayer/', true);
                    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                    xhr.send(`token=${player.token}`);
                    location.reload() 
                });

                placeholder.appendChild(clone);
            });
        }
        
        sendRequest();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .data-placeholder {
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .data {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: calc(100% - 40px);
            margin: 10px auto;
            background-color: gray;
            color: white;
            flex-direction: row;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 10px 20px;
        }
        .data-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 20px;
            width: 50%;
        }
        .data-container h4 {
            margin-right: 10px;
        }
        .button-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            width: 50%;
        }
        .regen-btn, .remove-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 4px;
            background-color: #222;
            color: #fff;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.2s;
        }
        .regen-btn:hover {
            background-color: #007bff;
        }
        .remove-btn:hover {
            background-color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="data-placeholder" id="data-placeholder"></div>

    <template id="player-template">
        <div class="data">
            <div class="data-container">
                <h4 class="player-name"></h4>
                <h4 class="player-token"></h4>
                <h4 class="player-register"></h4>
                <h4 class="player-banned"></h4>
                <input type="hidden" name="token" id="tokenplaceholder">
            </div>
            <div class="button-container">
                <button class="regen-btn">Regenerate Token</button>
                <button class="remove-btn">Remove</button>
                <button class="remove-btn" id="ban-btn">Ban/Enable</button>
            </div>
        </div>
    </template>
    <p>Add Player:</p>
    <form action="/manualnewplayer/" method="POST">
        <input type="text" name="name" placeholder="Name">
        <input type="submit">
    </form>
</body>
</html>
